name: Build RSIL-DuckStation (Self-Contained)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  DUCKSTATION_REF: "v0.1-11515"
  DEPS_TAG: "release-20260614"
  RSIL_GUID: "{B5E8D2F1-3A4C-4E6F-9B7A-1C2D3E4F5A6B}"

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout RSIL repo
        uses: actions/checkout@v4
        with:
          path: rsil-repo

      - name: Checkout DuckStation
        uses: actions/checkout@v4
        with:
          repository: stenzek/duckstation
          ref: ${{ env.DUCKSTATION_REF }}
          path: duckstation

      - name: Extract RSIL source + patch DuckStation
        shell: bash
        run: |
          set -e
          cp rsil-repo/rsil-source.tar rsil.tar
          mkdir -p rsil && tar xf rsil.tar -C rsil && rm rsil.tar
          echo "RSIL: $(find rsil -name '*.cpp' -o -name '*.h' | wc -l) files"
          grep -q "analyze_branch_safety" rsil/src/MipsPatternScanner.cpp && echo "D3: OK" || exit 1
          grep -q "json_escape" rsil/src/RSILSubsystem.cpp && echo "D10: OK" || exit 1
          grep -q "desync watchdog" rsil/src/GpuPacketParser.cpp && echo "D12: OK" || exit 1
          grep -q "SignatureRegistry::restore" rsil/src/ClusterSignature.cpp && echo "D13: OK" || exit 1
          mkdir -p duckstation/dep/rsil && cp -r rsil/* duckstation/dep/rsil/
          python3 rsil-repo/patch_ds.py
          grep -q "Auto-activate Enhanced mode" duckstation/src/core/system.cpp && echo "Auto-activation: OK"
          grep -q "SetRSILZScale" duckstation/src/core/gte.cpp && echo "GTE Z-scale: OK"
          grep -q "tap GP0" duckstation/src/core/gpu.cpp && echo "GP0 tap: OK"
          grep -q "rsil" duckstation/src/core/core.vcxproj && echo "core.vcxproj: OK"

      - name: Download deps
        shell: bash
        run: |
          curl -sL -o deps.7z "https://github.com/duckstation/dependencies/releases/download/$DEPS_TAG/deps-windows-x64.7z"
          mkdir -p duckstation/dep/prebuilt && 7z x deps.7z -oduckstation/dep/prebuilt -y

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: cmd
        run: msbuild "duckstation\duckstation.sln" /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /v:minimal

      - name: Package with Qt plugins
        shell: bash
        run: |
          set -e
          PKG="duckstation-rsil-windows-x64"
          rm -rf "$PKG"; mkdir -p "$PKG"
          BIN=""
          for c in "duckstation/build/Release-x64/bin" "duckstation/bin/Release" "duckstation/bin"; do
            [ -f "$c/duckstation-qt.exe" ] && BIN="$c" && break
          done
          [ -z "$BIN" ] && BIN=$(find duckstation -name "duckstation-qt.exe" -printf '%h' -quit 2>/dev/null)
          [ -z "$BIN" ] && echo "ERROR: exe not found" && exit 1
          cp "$BIN"/*.exe "$PKG/" 2>/dev/null; cp "$BIN"/*.dll "$PKG/" 2>/dev/null
          WDQ=$(find "$BIN" duckstation/dep/prebuilt -name "windeployqt.exe" -print -quit 2>/dev/null)
          [ -n "$WDQ" ] && "$WDQ" --release --no-translations --no-system-d3d-compiler --no-opengl-sw "$PKG/duckstation-qt.exe"
          QTP=""
          for c in "$BIN/Qt6/plugins" "$BIN/plugins" "duckstation/dep/prebuilt/windows-x64/Qt6/plugins" "duckstation/dep/prebuilt/windows-x64/plugins"; do
            [ -f "$c/platforms/qwindows.dll" ] && QTP="$c" && break
          done
          if [ -n "$QTP" ]; then
            for sub in platforms imageformats mediaservice styles tls networkinformation iconengines platforminputcontexts renderers; do
              [ -d "$QTP/$sub" ] && cp -r "$QTP/$sub" "$PKG/$sub"
            done
          fi
          [ -f "duckstation/dep/prebuilt/windows-x64/bin/Qt6Core.dll" ] && cp duckstation/dep/prebuilt/windows-x64/bin/Qt6*.dll "$PKG/" 2>/dev/null
          [ -d "duckstation/data" ] && cp -r duckstation/data "$PKG/"
          mkdir -p "$PKG/settings"
          printf '[RSIL]\nTelemetry = true\nGraph = true\nPredictor = true\nPreRegister = true\nOverlay = false\nPersistence = true\nValidator = false\n' > "$PKG/settings/rsil.ini"
          [ -f "$PKG/platforms/qwindows.dll" ] && echo "OK: qwindows.dll present" || echo "WARN: qwindows.dll missing"
          powershell -Command "Compress-Archive -Path '$PKG/*' -DestinationPath 'duckstation-rsil-windows-x64.zip'"
          ls -la duckstation-rsil-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckstation-rsil-windows-x64
          path: duckstation-rsil-windows-x64.zip
          retention-days: 90
