name: Build SIE-DuckStation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout DuckStation
        run: |
          git clone --depth 1 https://github.com/stenzek/DuckStation.git
          cd DuckStation
          git config core.fileMode false
        shell: cmd

      - name: Decode SIE patch
        shell: python
        run: |
          import base64
          data = base64.b64decode("")
          with open("duckstation-sie.patch", "wb") as f:
              f.write(data)
          print(f"Patch: {len(data)} bytes")

      - name: Apply SIE patch
        run: |
          cd DuckStation
          git apply ..\duckstation-sie.patch
        shell: cmd

      - name: Download prebuilt deps
        run: |
          cd DuckStation
          set /p DEPS_VERSION=<dep\PREBUILT-VERSION
          curl -L -o deps.7z "https://github.com/duckstation/dependencies/releases/download/%DEPS_VERSION%/deps-windows-x64.7z"
          "C:\Program Files\7-Zip\7z.exe" x deps.7z -o"dep\prebuilt" -y
        shell: cmd

      - name: Fix zlib headers
        run: |
          cd DuckStation
          if not exist "dep\zlib\include" mkdir "dep\zlib\include"
          copy "dep\prebuilt\windows-x64\include\zlib.h" "dep\zlib\include\zlib.h"
          copy "dep\prebuilt\windows-x64\include\zconf.h" "dep\zlib\include\zconf.h"
        shell: cmd

      - name: Build
        run: |
          cd DuckStation
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" duckstation.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m
        shell: cmd

      - name: Package
        run: |
          cd DuckStation\bin\x64
          echo. > portable.txt
          (
            echo [sise]
            echo enabled=true
            echo patched_radius=99999.0
            echo show_overlay=true
          ) > settings.ini
          7z a ..\..\..\sie-duckstation.7z *.exe *.dll settings.ini portable.txt
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: sie-duckstation
          path: DuckStation\sie-duckstation.7z
