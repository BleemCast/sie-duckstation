name: Build DuckStation with Draw Distance Patcher

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Clone DuckStation
        run: git clone --depth 1 https://github.com/stenzek/duckstation.git duckstation
        shell: cmd

      - name: Apply draw distance patcher
        shell: python
        run: |
          import os
          sys_cpp = 'duckstation/src/core/system.cpp'
          with open(sys_cpp, 'r', encoding='utf-8') as f:
              src = f.read()
          src = src.replace('#include "gpu_dump.h"', '#include "gpu_dump.h"' + chr(10) + '#include "bus.h"' + chr(10) + '#include "core.h"' + chr(10) + '#include "cpu_core.h"' + chr(10) + '#include <vector>' + chr(10) + '#include <algorithm>' + chr(10) + '#include <cstring>')
          patcher = chr(10) + 'namespace DrawDistancePatcher {' + chr(10)
          patcher += '    static bool s_scanned = false;' + chr(10)
          patcher += '    static std::vector<u32> s_patched_offsets;' + chr(10)
          patcher += '    static float s_multiplier = 8.0f;' + chr(10)
          patcher += '    static bool s_enabled = true;' + chr(10)
          patcher += '    static bool s_settings_loaded = false;' + chr(10)
          patcher += '    static u32 s_min_imm = 50;' + chr(10)
          patcher += '    static u32 s_max_imm = 10000;' + chr(10)
          patcher += '    static int s_min_score = 5;' + chr(10)
          patcher += '    static int s_max_patches = 64;' + chr(10)
          patcher += '    static u32 MipsOp(u32 w) { return w >> 26; }' + chr(10)
          patcher += '    static u32 MipsFunc(u32 w) { return w & 0x3F; }' + chr(10)
          patcher += '    static u32 MipsRs(u32 w) { return (w >> 21) & 0x1F; }' + chr(10)
          patcher += '    static u32 MipsRt(u32 w) { return (w >> 16) & 0x1F; }' + chr(10)
          patcher += '    static void LoadSettings() {' + chr(10)
          patcher += '        if (s_settings_loaded) return;' + chr(10)
          patcher += '        s_settings_loaded = true;' + chr(10)
          patcher += '        s_enabled = Core::GetBaseBoolSettingValue("draw_distance", "enabled", true);' + chr(10)
          patcher += '        s_multiplier = Core::GetBaseFloatSettingValue("draw_distance", "multiplier", 8.0f);' + chr(10)
          patcher += '        if (s_multiplier < 1.0f) s_multiplier = 1.0f;' + chr(10)
          patcher += '        s_min_score = Core::GetBaseIntSettingValue("draw_distance", "min_score", 5);' + chr(10)
          patcher += '        s_max_patches = Core::GetBaseIntSettingValue("draw_distance", "max_patches", 64);' + chr(10)
          patcher += '    }' + chr(10)
          patcher += '    static void ScanAndPatch() {' + chr(10)
          patcher += '        if (s_scanned) return;' + chr(10)
          patcher += '        LoadSettings();' + chr(10)
          patcher += '        if (!s_enabled) { s_scanned = true; return; }' + chr(10)
          patcher += '        if (!Bus::g_ram_code_bits.any()) return;' + chr(10)
          patcher += '        u32 text_addr = 0, text_size = 0;' + chr(10)
          patcher += '        const u8 magic[8] = ' + chr(39) + 'P' + chr(39) + ',' + chr(39) + 'S' + chr(39) + ',' + chr(39) + '-' + chr(39) + ',' + chr(39) + 'X' + chr(39) + ',' + chr(39) + ' ' + chr(39) + ',' + chr(39) + 'E' + chr(39) + ',' + chr(39) + 'X' + chr(39) + ',' + chr(39) + 'E' + chr(39) + '};' + chr(10)
          patcher += '        for (u32 i = 0; i < Bus::g_ram_size - 0x800; ++i) {' + chr(10)
          patcher += '            if (!std::memcmp(Bus::g_ram + i, magic, 8)) {' + chr(10)
          patcher += '                const u8* h = Bus::g_ram + i;' + chr(10)
          patcher += '                text_addr = h[0x18] | (h[0x19]<<8) | (h[0x1A]<<16) | (h[0x1B]<<24);' + chr(10)
          patcher += '                text_size = h[0x1C] | (h[0x1D]<<8) | (h[0x1E]<<16) | (h[0x1F]<<24);' + chr(10)
          patcher += '                break;' + chr(10)
          patcher += '            }' + chr(10)
          patcher += '        }' + chr(10)
          patcher += '        if (text_size == 0 || text_size > 0x80000) { s_scanned = true; return; }' + chr(10)
          patcher += '        u32 ram_offset = text_addr & 0x1FFFFF;' + chr(10)
          patcher += '        if (ram_offset + text_size > Bus::g_ram_size) text_size = Bus::g_ram_size - ram_offset;' + chr(10)
          patcher += '        const u8* code = Bus::g_ram + ram_offset;' + chr(10)
          patcher += '        u32 patch_count = 0;' + chr(10)
          patcher += '        for (u32 off = 0; off + 12 <= text_size; off += 4) {' + chr(10)
          patcher += '            u32 w = *(u32*)(code + off); u32 op = MipsOp(w);' + chr(10)
          patcher += '            if (op != 0x0A && op != 0x0B) continue;' + chr(10)
          patcher += '            int16_t imm = (int16_t)(w & 0xFFFF);' + chr(10)
          patcher += '            if (imm < (int)s_min_imm || imm > (int)s_max_imm) continue;' + chr(10)
          patcher += '            u32 rt = MipsRt(w);' + chr(10)
          patcher += '            bool found = false, safe = false;' + chr(10)
          patcher += '            for (u32 j = 1; j <= 3 && off + j*4 + 4 <= text_size; ++j) {' + chr(10)
          patcher += '                u32 bw = *(u32*)(code + off + j*4); u32 bop = MipsOp(bw); u32 bf = MipsFunc(bw); u32 brs = MipsRs(bw); u32 brt = MipsRt(bw);' + chr(10)
          patcher += '                if (bop == 0x04 && (brs == rt || brt == rt)) { found = true; safe = true; break; }' + chr(10)
          patcher += '                if (bop == 0x06 && brs == rt) { found = true; safe = true; break; }' + chr(10)
          patcher += '                if (bop == 0x05 && (brs == rt || brt == rt)) { found = true; break; }' + chr(10)
          patcher += '                if (bop == 0x07 && brs == rt) { found = true; break; }' + chr(10)
          patcher += '                if (bop == 0x01 && (bf == 0x00 || bf == 0x01) && brs == rt) { found = true; break; }' + chr(10)
          patcher += '            }' + chr(10)
          patcher += '            if (!found || !safe) continue;' + chr(10)
          patcher += '            int score = 0;' + chr(10)
          patcher += '            for (int k = 1; k <= 5 && off >= (u32)(k*4); ++k) {' + chr(10)
          patcher += '                u32 pw = *(u32*)(code + off - k*4); u32 pop = MipsOp(pw); u32 pf = MipsFunc(pw);' + chr(10)
          patcher += '                if (pop == 0x00 && (pf == 0x22 || pf == 0x23)) score += 3;' + chr(10)
          patcher += '                else if (pop == 0x18) score += 4;' + chr(10)
          patcher += '                else if (pop == 0x00 && pf == 0x21) score += 1;' + chr(10)
          patcher += '                else if (pop == 0x00 && pf == 0x00) score += 1;' + chr(10)
          patcher += '            }' + chr(10)
          patcher += '            if (imm > 500 && imm < 5000) score += 1;' + chr(10)
          patcher += '            score += 2;' + chr(10)
          patcher += '            if (score < s_min_score) continue;' + chr(10)
          patcher += '            if (std::find(s_patched_offsets.begin(), s_patched_offsets.end(), off) != s_patched_offsets.end()) continue;' + chr(10)
          patcher += '            int new_val = (int)(imm * s_multiplier);' + chr(10)
          patcher += '            if (new_val > 32767) new_val = 32767;' + chr(10)
          patcher += '            if (new_val == imm) continue;' + chr(10)
          patcher += '            u32 patched = (w & 0xFFFF0000) | (new_val & 0xFFFF);' + chr(10)
          patcher += '            CPU::SafeWriteMemoryWord(text_addr + off, patched);' + chr(10)
          patcher += '            s_patched_offsets.push_back(off);' + chr(10)
          patcher += '            ++patch_count;' + chr(10)
          patcher += '            if (patch_count >= s_max_patches) break;' + chr(10)
          patcher += '        }' + chr(10)
          patcher += '        s_scanned = true;' + chr(10)
          patcher += '        INFO_LOG("DrawDistance: applied {} patches", patch_count);' + chr(10)
          patcher += '    }' + chr(10)
          patcher += '}' + chr(10)
          src = src.replace('void System::FrameDone()', patcher + chr(10) + 'void System::FrameDone()')
          src = src.replace('void System::FrameDone()' + chr(10) + '{', 'void System::FrameDone()' + chr(10) + '{' + chr(10) + '  DrawDistancePatcher::ScanAndPatch();')
          with open(sys_cpp, 'w', encoding='utf-8') as f:
              f.write(src)
          print("Draw distance patcher injected.")

      - name: Download prebuilt dependencies
        shell: cmd
        run: |
          curl -sL -o deps.7z "https://github.com/duckstation/dependencies/releases/download/release-20260614/deps-windows-x64.7z"
          mkdir duckstation\dep\prebuilt 2>nul
          7z x deps.7z -oduckstation\dep\prebuilt -y

      - name: Build
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installerswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe`) do set MSBUILD=%%i
          cd duckstation
          "%MSBUILD%" duckstation.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m /v:minimal

      - name: Package
        shell: cmd
        run: |
          echo. > duckstationind\portable.txt
          mkdir duckstationind\settings 2>nul
          echo [draw_distance] > duckstationind\settings\settings.ini
          echo enabled=true >> duckstationind\settings\settings.ini
          echo multiplier=8.0 >> duckstationind\settings\settings.ini
          echo min_score=5 >> duckstationind\settings\settings.ini
          echo max_patches=64 >> duckstationind\settings\settings.ini
          7z a duckstation-drawdistance.7z duckstationind\*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckstation-drawdistance
          path: duckstation-drawdistance.7z
          retention-days: 90
